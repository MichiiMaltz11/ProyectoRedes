!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R1
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
vlan internal allocation policy ascending
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 description Conexion a SwitchRedRoom - Cuarto de Red
 ip address 192.168.51.33 255.255.255.248
 duplex auto
 speed auto
!
interface FastEthernet0/1
 description Conexion a SwitchReception - Recepcion
 ip address 192.168.50.73 255.255.255.248
 duplex auto
 speed auto
!
interface FastEthernet1/0
 description Conexion a SwitchSales - Ventas
 no switchport
 ip address 192.168.50.17 255.255.255.248
!
interface FastEthernet1/1
 description Conexion a SwitchCostumerService - Atencion al Cliente
 no switchport
 ip address 192.168.50.57 255.255.255.248
!
interface FastEthernet1/2
 description Conexion a SwitchCameras - Camaras Piso 1
 no switchport
 ip address 192.168.50.81 255.255.255.248
!
interface FastEthernet1/3
!
interface FastEthernet1/4
!
interface FastEthernet1/5
!
interface FastEthernet1/6
!
interface FastEthernet1/7
!
interface FastEthernet1/8
!
interface FastEthernet1/9
!
interface FastEthernet1/10
!
interface FastEthernet1/11
!
interface FastEthernet1/12
!
interface FastEthernet1/13
!
interface FastEthernet1/14
!
interface FastEthernet1/15
!
interface Serial2/0
 description Enlace WAN hacia R2
 ip address 192.168.100.1 255.255.255.252
 serial restart-delay 0
 clock rate 64000
!
interface Serial2/1
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/2
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/3
 no ip address
 shutdown
 serial restart-delay 0
!
interface Vlan1
 no ip address
!
router ospf 1
 router-id 1.1.1.1
 log-adjacency-changes
 passive-interface FastEthernet0/0
 passive-interface FastEthernet0/1
 passive-interface FastEthernet1/0
 passive-interface FastEthernet1/1
 passive-interface FastEthernet1/2
 network 192.168.50.16 0.0.0.7 area 0
 network 192.168.50.56 0.0.0.7 area 0
 network 192.168.50.72 0.0.0.7 area 0
 network 192.168.50.80 0.0.0.7 area 0
 network 192.168.51.32 0.0.0.7 area 0
 network 192.168.100.0 0.0.0.3 area 0
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
