!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
vlan internal allocation policy ascending
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 description Conexion a SwitchGeneralManagment - Gerencia
 ip address 192.168.50.49 255.255.255.248
 duplex auto
 speed auto
!
interface FastEthernet0/1
 description Conexion a SwitchIT - IT
 ip address 192.168.50.1 255.255.255.240
 duplex auto
 speed auto
!
interface FastEthernet1/0
 description Conexion a SwitchServer - Servidores
 no switchport
 ip address 192.168.50.41 255.255.255.248
!
interface FastEthernet1/1
 description Conexion a SwitchSoporte - Soporte
 no switchport
 ip address 192.168.51.1 255.255.255.248
!
interface FastEthernet1/2
 description Conexion a SwitchCamera3 - Camaras Piso 3
 no switchport
 ip address 192.168.51.17 255.255.255.248
!
interface FastEthernet1/3
 description Conexion a SwitchBoardRoom - Sala de Juntas
 no switchport
 ip address 192.168.51.25 255.255.255.248
!
interface FastEthernet1/4
!
interface FastEthernet1/5
!
interface FastEthernet1/6
!
interface FastEthernet1/7
!
interface FastEthernet1/8
!
interface FastEthernet1/9
!
interface FastEthernet1/10
!
interface FastEthernet1/11
!
interface FastEthernet1/12
!
interface FastEthernet1/13
!
interface FastEthernet1/14
!
interface FastEthernet1/15
!
interface Serial2/0
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/1
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/2
 no ip address
 shutdown
 serial restart-delay 0
!
interface Serial2/3
 no ip address
 shutdown
 serial restart-delay 0
!
interface Vlan1
 no ip address
!
router ospf 1
 router-id 3.3.3.3
 log-adjacency-changes
 passive-interface FastEthernet0/0
 passive-interface FastEthernet0/1
 passive-interface FastEthernet1/0
 passive-interface FastEthernet1/1
 passive-interface FastEthernet1/2
 passive-interface FastEthernet1/3
 network 192.168.50.0 0.0.0.15 area 0
 network 192.168.50.40 0.0.0.7 area 0
 network 192.168.50.48 0.0.0.7 area 0
 network 192.168.51.0 0.0.0.7 area 0
 network 192.168.51.16 0.0.0.7 area 0
 network 192.168.51.24 0.0.0.7 area 0
 network 192.168.100.4 0.0.0.3 area 0
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
